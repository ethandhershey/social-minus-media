[server]
address = "127.0.0.1:3000"
frontend_dir = "./frontend/dist"
logs_dir = "./logs"
max_upload_size = 10485760
allowed_origins = [
    "http://localhost:3000",
    "chrome-extension://your-extension-id",
]

[database]
url = { env = "DATABASE_URL" }
max_connections = 5

[llm.providers.openai]
base_url = "https://api.openai.com/v1"
key = "sk-dev-xxxxxxxx"

[llm.providers.openai.models.gpt-4o]

[llm.providers.openai.models.gpt-4o-mini]
max_tokens = 2048
temperature = 0.5

[llm.providers.ollama]
base_url = "http://localhost:11434/v1"
embed_models = ["qwen3-embedding:0.6b"]

[llm.providers.ollama.models."qwen3.5:4b-q8_0"]

# [llm.providers.openai-compat]
# base_url = "https://api.some-compat-provider.com/v1"
# key = { env = "OPENAI_COMPAT_API_KEY" }

# [llm.providers.openai-compat.models.some-compat-model]
# max_tokens = 8192

[llm.interests]
summary_model = "ollama:qwen3.5:4b-q8_0"
embed_model = "ollama:qwen3-embedding:0.6b"

[zitadel]
issuer = "https://idm.example.com"
client_id = "your-client-id"
jwks_url = "https://idm.example.com/oauth/v2/keys"

[tiers.free]
max_projects = 3
max_storage_gb = 1
can_export = false
api_calls_per_day = 100

[tiers.essential]
max_projects = 15
max_storage_gb = 5
can_export = true
api_calls_per_day = 1000

[tiers.pro]
max_projects = 50
max_storage_gb = 20
can_export = true
api_calls_per_day = 10000

[tiers.enterprise]
max_projects = 1000
max_storage_gb = 300
can_export = true
api_calls_per_day = 1_000_000

[stripe]
secret_key = "sk_test_your-secret-key"
webhook_secret = "whsec_your-webhook-secret"
essential_price_id = "price_your-essential-price-id"
pro_price_id = "price_your-pro-price-id"
success_url = "http://localhost:3000/dashboard?upgraded=true"
cancel_url = "http://localhost:3000/pricing"
portal_return_url = "http://localhost:3000/settings"

[resend]
api_key = "re_your-api-key"
sender_email = "noreply@example.com"
sender_name = "Your App"
